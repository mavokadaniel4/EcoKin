<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoKin - Inscription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-white bg-white shadow-sm sticky-top">
        <div class="container"><a class="navbar-brand fw-bold text-success" href="accueil.html">🌿 EcoKin</a></div>
    </nav>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <div class="card shadow p-4 w-100" style="max-width: 500px;">
            <h3 class="fw-bold text-center mb-4">Créer un compte</h3>
            <form action="#" method="POST">
                <div class="row g-2 mb-3">
                    <div class="col-md-6"><label class="form-label">Nom</label><input type="text" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">Prénom</label><input type="text" class="form-control" required></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Commune</label>
                    <select class="form-select" required>
                        <option value="">Sélectionnez votre commune...</option>
                        <option>Gombe</option><option>Limete</option><option>Ngaliema</option><option>Kasa-Vubu</option><option>Lemba</option>
                    </select>
                </div>
                <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" required></div>
                <div class="row g-2 mb-3">
                    <div class="col-md-6"><label class="form-label">Mot de passe</label><input type="password" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">Confirmation</label><input type="password" class="form-control" required></div>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2 fw-bold">S'inscrire</button>
            </form>
            <p class="text-center mt-3 small text-muted">Déjà inscrit ? <a class="text-success text-decoration-none fw-bold" href="connexion.html">Se connecter</a></p>
        </div>
    </main>

    <footer class="bg-dark text-light py-4 mt-auto"><div class="container text-center"><p class="small text-muted mb-0">🌿 EcoKin</p></div></footer>
</body>
</html>
