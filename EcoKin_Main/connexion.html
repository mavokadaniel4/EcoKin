<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoKin - Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-white bg-white shadow-sm sticky-top">
        <div class="container"><a class="navbar-brand fw-bold text-success" href="accueil.html">🌿 EcoKin</a></div>
    </nav>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <div class="card shadow p-4 w-100" style="max-width: 400px;">
            <h3 class="fw-bold text-center mb-4">Connexion</h3>
            <form action="#" method="POST">
                <div class="mb-3"><label class="form-label fw-medium">Email</label><input type="email" class="form-control" required></div>
                <div class="mb-3">
                    <div class="d-flex justify-content-between"><label class="form-label fw-medium">Mot de passe</label><a href="mot-de-passe-oublie.html" class="text-success small text-decoration-none">Oublié ?</a></div>
                    <input type="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Se connecter</button>
            </form>
            <p class="text-center mt-3 small text-muted">Nouveau ? <a class="text-success text-decoration-none fw-bold" href="inscription.html">Créer un compte</a></p>
        </div>
    </main>

    <footer class="bg-dark text-light py-4 mt-auto"><div class="container text-center"><p class="small text-muted mb-0">🌿 EcoKin</p></div></footer>
</body>
</html>
