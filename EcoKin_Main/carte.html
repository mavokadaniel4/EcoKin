<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoKin - Carte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>#map { height: 450px; width: 100%; border-radius: 12px; }</style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-white bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-success" href="accueil.html">🌿 EcoKin</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="accueil.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="articles.html">Articles</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold text-success" href="carte.html">Points de collecte</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <h2 class="fw-bold mb-2">Points de collecte de déchets</h2>
        <p class="text-muted mb-4">Trouvez le point de dépôt ou de recyclage le plus proche de chez vous à Kinshasa.</p>
        <div class="row g-4">
            <div class="col-lg-8"><div id="map"></div></div>
            <div class="col-lg-4">
                <div class="list-group">
                    <div class="list-group-item active bg-success border-success fw-bold">Points disponibles</div>
                    <div class="list-group-item">📍 Point Vert - Gombe (Boulevard du 30 Juin)</div>
                    <div class="list-group-item">📍 Décharge Trié - Limete (7ème Rue)</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-light py-4 mt-auto">
        <div class="container text-center"><p class="small text-muted mb-0">🌿 EcoKin</p></div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([-4.325, 15.322], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.marker([-4.314, 15.305]).addTo(map).bindPopup("<b>Point Vert - Gombe</b>");
        L.marker([-4.348, 15.318]).addTo(map).bindPopup("<b>Décharge Trié - Limete</b>");
    </script>
</body>
</html>
